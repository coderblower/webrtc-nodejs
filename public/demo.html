<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iframe Demo - Telemedicine Consultation</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #f1f5f9;
      margin: 0;
      padding: 40px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .container {
      background: white;
      padding: 24px;
      border-radius: 12px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
      width: 100%;
      max-width: 800px;
      margin-bottom: 30px;
    }
    h1 {
      margin-top: 0;
      color: #0f172a;
      font-size: 24px;
    }
    .input-group {
      display: flex;
      gap: 12px;
      margin-top: 20px;
    }
    input {
      flex: 1;
      padding: 12px 16px;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      font-size: 16px;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus {
      border-color: #2563eb;
    }
    button {
      padding: 12px 24px;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
      font-weight: 600;
      transition: background 0.2s;
    }
    button:hover {
      background: #1d4ed8;
    }
    #iframe-container {
      width: 100%;
      max-width: 800px;
      height: 600px;
      background: #e2e8f0;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #64748b;
      overflow: hidden;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
      border-radius: 12px;
    }
  </style>
</head>
<body>

  <div class="container" style="text-align: center;">
    <h1>Doctor Dashboard</h1>
    <p style="color: #64748b; margin-bottom: 24px;">Start a new consultation to generate a secure access code for your patient.</p>
    
    <button onclick="createMeeting()" style="background: #10b981; padding: 16px 32px; font-size: 18px; width: 100%; max-width: 300px;">Host New Consultation</button>

    <div id="codeDisplay" style="display: none; margin-top: 24px; padding: 20px; background: #f8fafc; border: 2px dashed #cbd5e1; border-radius: 8px;">
      <p style="margin: 0; color: #64748b; font-size: 14px;">Share this code with your patient:</p>
      <h2 id="generatedCode" style="margin: 8px 0 0 0; font-size: 36px; color: #0f172a; letter-spacing: 4px;"></h2>
    </div>
  </div>

  <div id="iframe-container">
    <p>The meeting room will appear here.</p>
  </div>

  <script>
    async function createMeeting() {
      try {
        const res = await fetch('/api/meetings/create', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            // Passing a dummy token since auth bypass is enabled for dev
            'Authorization': 'Bearer dummy-token'
          }
        });
        const data = await res.json();
        if (data.success) {
          document.getElementById('codeDisplay').style.display = 'block';
          document.getElementById('generatedCode').innerText = data.joinCode;
          loadIframe(data.joinCode, 'doctor');
        } else {
          alert("Failed to create meeting: " + data.error);
        }
      } catch (err) {
        alert("Error creating meeting. Make sure the backend is running.");
      }
    }

    function loadIframe(code, role = 'doctor') {
      const container = document.getElementById('iframe-container');

      if (!code) {
        alert("Please enter a meeting code.");
        return;
      }

      // Dynamically create the iframe with the provided code
      container.innerHTML = `
        <iframe 
          src="https://meet.shohozprobash.com/meet.html?code=${code}&role=${role}" 
          allow="camera; microphone; fullscreen; display-capture"
        ></iframe>
      `;
    }
  </script>

</body>
</html>
